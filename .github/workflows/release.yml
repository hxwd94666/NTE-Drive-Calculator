name: Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Upload installer to a GitHub Release'
        required: true
        type: boolean
        default: false
      release_tag:
        description: 'Release tag, such as v1.1.2. Leave empty to use vAPP_VERSION.'
        required: false
        type: string
        default: ''
  push:
    tags:
      - '*'

permissions:
  contents: write

env:
  NTE_CORE_RELEASE_TAG: v0.3.3-build-73-65585f1
  NTE_CORE_ARCHIVE_SHA256: 0988312150E19567B0B76D090E04D8215B69A279C0C8A2F2C13DF9C0B71D6000
  NTE_CORE_LICENSE_SHA256: E0EEDBA615D5CD1B986AFB6C5B3A4B1AE33713E7E9DC74D19DAEC5E3221F9D2E

jobs:
  tests:
    name: Run release tests
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        shell: pwsh
        run: |
          $stubDir = Join-Path $env:RUNNER_TEMP 'pip-msiexec-stub'
          New-Item -ItemType Directory -Force -Path $stubDir | Out-Null
          Set-Content -Path (Join-Path $stubDir 'msiexec.bat') -Encoding ascii -Value @(
            '@echo off',
            'echo Skipping vgamepad ViGEmBus driver install during dependency installation.',
            'exit /b 0'
          )
          $env:PATH = "$stubDir;$env:PATH"

          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run full test suite
        shell: pwsh
        env:
          PYTHONUTF8: '1'
        run: python -m unittest discover -s tests

  windows-installer:
    name: Build Windows installer
    needs: tests
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $eventName = '${{ github.event_name }}'
          $appVersion = python -c "from src.app.constants import APP_VERSION; print(APP_VERSION)"
          $publishRelease = 'false'

          if ($eventName -eq 'push') {
            $tag = '${{ github.ref_name }}'
            $version = $tag -replace '^v', ''
            $publishRelease = 'true'

            if ($version -notmatch '^\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$') {
              throw "Tag '$tag' does not look like a release version. Use tags like '1.1.2' or 'v1.1.2'."
            }

            if ($appVersion -ne $version) {
              throw "Tag version '$version' must match src.app.constants.APP_VERSION '$appVersion'."
            }
          } else {
            $tag = '${{ github.event.inputs.release_tag }}'.Trim()
            if ([string]::IsNullOrWhiteSpace($tag)) {
              $tag = "v$appVersion"
            }
            $version = $tag -replace '^v', ''
            $publishRelease = '${{ github.event.inputs.publish_release }}'.ToLowerInvariant()

            if ($version -notmatch '^\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$') {
              throw "Release tag '$tag' does not look like a release version. Use tags like '1.1.2' or 'v1.1.2'."
            }

            if ($appVersion -ne $version) {
              throw "Release tag version '$version' must match src.app.constants.APP_VERSION '$appVersion'."
            }
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "installer=NTE_Drive_Calc_Setup_$version.exe" >> $env:GITHUB_OUTPUT
          "publish_release=$publishRelease" >> $env:GITHUB_OUTPUT

      - name: Install Python dependencies
        shell: pwsh
        run: |
          $stubDir = Join-Path $env:RUNNER_TEMP 'pip-msiexec-stub'
          New-Item -ItemType Directory -Force -Path $stubDir | Out-Null
          Set-Content -Path (Join-Path $stubDir 'msiexec.bat') -Encoding ascii -Value @(
            '@echo off',
            'echo Skipping vgamepad ViGEmBus driver install during dependency installation.',
            'exit /b 0'
          )
          $env:PATH = "$stubDir;$env:PATH"

          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare pinned nte-core release
        shell: pwsh
        run: |
          $bundleDir = Join-Path $PWD 'build_resources\nte-core'
          $archive = Join-Path $env:RUNNER_TEMP 'nte-core-windows-x64.zip'
          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null

          $releaseUrl = "https://github.com/kongbaiz/nte-dps-toolkit/releases/download/$env:NTE_CORE_RELEASE_TAG/nte-core-windows-x64.zip"
          Invoke-WebRequest -Uri $releaseUrl -OutFile $archive
          $archiveHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive).Hash
          if ($archiveHash -ne $env:NTE_CORE_ARCHIVE_SHA256) {
            throw "nte-core archive SHA-256 mismatch: $archiveHash"
          }
          Expand-Archive -LiteralPath $archive -DestinationPath $bundleDir -Force

          $licensePath = Join-Path $bundleDir 'LICENSE'
          $licenseUrl = "https://raw.githubusercontent.com/kongbaiz/nte-dps-toolkit/$env:NTE_CORE_RELEASE_TAG/LICENSE"
          Invoke-WebRequest -Uri $licenseUrl -OutFile $licensePath
          $licenseHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $licensePath).Hash
          if ($licenseHash -ne $env:NTE_CORE_LICENSE_SHA256) {
            throw "nte-core LICENSE SHA-256 mismatch: $licenseHash"
          }

          $coreExe = Join-Path $bundleDir 'nte-core.exe'
          if (-not (Test-Path $coreExe)) {
            throw "nte-core.exe is missing from the pinned release archive."
          }
          "NTE_CORE_EXE=$coreExe" >> $env:GITHUB_ENV

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

          $command = Get-Command ISCC.exe -ErrorAction SilentlyContinue
          if ($command) {
            $iscc = $command.Source
          }

          if (-not $iscc) {
            throw 'ISCC.exe was not found after installing Inno Setup.'
          }

          "INNO_SETUP_ISCC=$iscc" >> $env:GITHUB_ENV

      - name: Build installer
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          PYTHONUTF8: '1'
        run: |
          python build_installer.py --version '${{ steps.version.outputs.version }}'
          $installer = 'installer\output\${{ steps.version.outputs.installer }}'
          if (-not (Test-Path $installer)) {
            throw "Expected installer was not created: $installer"
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.version.outputs.installer }}
          path: installer/output/${{ steps.version.outputs.installer }}
          if-no-files-found: error
          retention-days: 14

      - name: Create or update GitHub release
        if: steps.version.outputs.publish_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $installer = 'installer\output\${{ steps.version.outputs.installer }}'

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $installer --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tag $installer --repo $env:GITHUB_REPOSITORY --title $tag --generate-notes --target $env:GITHUB_SHA
          }
